name: Build Windows EXE

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller

      - name: Build EXE
        run: >-
          pyinstaller countdown.py
          --onefile
          --noconsole
          --icon meditation.ico
          --name Countdown
          --clean
          --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Countdown-Windows
          path: dist/*.exe
